name: Test ML Ofertas Fetch

on:
  push:
    branches: [bot-dev]

permissions:
  contents: write

jobs:
  test-fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: bot-dev

      - name: Fetch /ofertas y medir parseabilidad
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          mkdir -p bot/state
          {
            echo "fecha: $(date -u '+%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3; do
              CODE=$(curl -s -m 30 -A "$UA" -H "Accept-Language: es-AR" \
                -o /tmp/ofertas.html -w "%{http_code}" \
                "https://www.mercadolibre.com.ar/ofertas?page=$i")
              SIZE=$(stat -c%s /tmp/ofertas.html 2>/dev/null || echo 0)
              CARDS=$(grep -o 'poly-card' /tmp/ofertas.html | wc -l || echo 0)
              PRICES=$(grep -o 'andes-money-amount__fraction' /tmp/ofertas.html | wc -l || echo 0)
              TITLES=$(grep -o 'poly-component__title' /tmp/ofertas.html | wc -l || echo 0)
              echo "page=$i http=$CODE bytes=$SIZE poly_cards=$CARDS prices=$PRICES titles=$TITLES"
              sleep 2
            done
          } > bot/state/test_result.txt
          cat bot/state/test_result.txt

      - name: Commit resultado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bot/state/test_result.txt
          git commit -m "test: resultado fetch /ofertas desde runner"
          git push origin bot-dev
