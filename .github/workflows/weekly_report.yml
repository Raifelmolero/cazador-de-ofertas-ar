name: Reporte Semanal

# Domingos 23:00 ART (lunes 02:00 UTC): resumen de la semana al admin por Telegram.

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deals-bot
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Enviar reporte
        working-directory: bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python weekly_report.py

      - name: Guardar historial de métricas
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bot/state
          if git diff --cached --quiet; then
            echo "Sin métricas nuevas."
          else
            git commit -m "bot: métricas semanales [skip ci]"
            git -c rebase.autoStash=true pull --rebase origin main
            git push origin main
          fi
